<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
        <ion-back-button defaultHref="/home"></ion-back-button>
      </ion-buttons>
    <ion-title>My Profile</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" *ngIf="profile">
  <div class="ion-text-center ion-padding">
    <ion-icon name="person-circle" style="font-size: 80px; color: var(--ion-color-primary)"></ion-icon>
    <h2>{{ profile.name }}</h2>
    <ion-badge color="primary">{{ profile.role | titlecase }}</ion-badge>
  </div>

  <ion-list>
    <ion-item>
      <ion-icon name="mail-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <p>Email</p>
        <h3>{{ profile.email }}</h3>
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-icon name="call-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <p>Phone</p>
        <h3>{{ profile.phone }}</h3>
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-icon name="home-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <p>Address</p>
        <h3>{{ profile.address }}</h3>
      </ion-label>
    </ion-item>
    <!-- <ion-item>
      <ion-icon name="person-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <p>Role</p>
        <h3>{{ profile.role }}</h3>
      </ion-label>
    </ion-item> -->
  </ion-list>

  <ion-button expand="block" color="danger" class="ion-margin-top" (click)="logout()">
    Logout
  </ion-button>
</ion-content>
