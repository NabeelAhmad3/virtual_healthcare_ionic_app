<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/welcome"></ion-back-button>
    </ion-buttons>
    <ion-title>Safety Bridge - Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="login-content">
  <div class="bg-overlay"></div>
  <div class="form-container">
    <div class="form-card">

      <div class="form-header">
        <ion-icon name="log-in-outline" color="primary" style="font-size:48px"></ion-icon>
        <h2>Welcome Back</h2>
        <p>Login to continue</p>
      </div>

      <ion-item class="custom-item">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-label position="floating">Email</ion-label>
        <ion-input [(ngModel)]="email" type="email"></ion-input>
      </ion-item>

      <ion-item class="custom-item">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-label position="floating">Password</ion-label>
        <ion-input [(ngModel)]="password" type="password"></ion-input>
      </ion-item>

      <p class="error-text" *ngIf="error">{{ error }}</p>

      <ion-button expand="block" class="login-btn" (click)="login()" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </ion-button>

      <ion-button expand="block" fill="clear" routerLink="/register">
        Don’t have an account? Register
      </ion-button>

    </div>
  </div>

</ion-content>
